<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoneLog</title>
    <script src="js/base-path.js"></script>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="css/prism-tomorrow-night.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <script src="css/prism.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" defer></script>

</head>
<body>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.localStorageFunctions = {
            setItem: function (key, value) {
                localStorage.setItem(key, value);
            },
            getItem: function (key) {
                return localStorage.getItem(key);
            }
        };
        window.boneLogMarkdown = {
            render: async function () {
                if (window.Prism) {
                    Prism.highlightAll();
                }
                if (!window.mermaid) {
                    return;
                }
                const isDark = document.getElementById("body")?.classList.contains("dark");
                mermaid.initialize({
                    startOnLoad: false,
                    theme: isDark ? "dark" : "default",
                    securityLevel: "loose"
                });
                const nodes = document.querySelectorAll(".markdown-content .mermaid");
                nodes.forEach(function (node) {
                    const source = node.getAttribute("data-source");
                    if (source) {
                        node.textContent = source;
                    }
                    node.removeAttribute("data-processed");
                });
                if (nodes.length > 0) {
                    await mermaid.run({ nodes: Array.from(nodes) });
                }
            }
        };
    </script>
</body>

</html>
